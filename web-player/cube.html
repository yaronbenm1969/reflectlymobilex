<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reflectly 3D Cube</title>
<style>
  :root {
    --size: 300px;
    --persp: 900px;
  }
  body {
    margin:0;
    display:grid;
    place-items:center;
    height:100vh;
    background:#0f1020;
    color:#fff;
    font-family:sans-serif;
    position:relative;
  }
  .audio-control {
    position:fixed;
    top:20px;
    right:20px;
    padding:10px 20px;
    background: linear-gradient(135deg, #8446b0 0%, #464fb0 100%);
    color:white;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-size:16px;
    z-index:1000;
  }
  .audio-control:hover {
    opacity: 0.9;
  }
  .progress-info {
    position:fixed;
    bottom:20px;
    left:50%;
    transform: translateX(-50%);
    padding:10px 20px;
    background: rgba(255,255,255,0.1);
    border-radius:20px;
    font-size:14px;
    z-index:1000;
  }
  .stage {
    width:var(--size);
    height:var(--size);
    perspective:var(--persp);
  }
  .cube {
    width:100%; height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition: transform 1.5s ease-in-out;
  }
  .face {
    position:absolute;
    width:100%; height:100%;
    display:grid; place-items:center;
    backface-visibility:hidden;
    border:2px solid rgba(255, 107, 157, 0.4);
    border-radius:12px;
    overflow:hidden;
    background:#222;
    font-size:20px;
    font-weight:bold;
  }
  .face video {
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .face .player-name {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    padding: 5px 15px;
    border-radius: 15px;
    font-size: 14px;
  }
  .front  { transform: translateZ(calc(var(--size)/2)); }
  .back   { transform: rotateY(180deg) translateZ(calc(var(--size)/2)); }
  .right  { transform: rotateY(90deg)  translateZ(calc(var(--size)/2)); }
  .left   { transform: rotateY(-90deg) translateZ(calc(var(--size)/2)); }
  .top    { transform: rotateX(90deg)  translateZ(calc(var(--size)/2)); }
  .bottom { transform: rotateX(-90deg) translateZ(calc(var(--size)/2)); }
  
  .face.active {
    border-color: #8446b0;
    box-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
  }
</style>
</head>
<body>
  <button class="audio-control" onclick="toggleAudio()" id="audioBtn">הפעל סאונד</button>
  
  <div class="stage">
    <div class="cube" id="cube">
      <div class="face front" data-face="0">
        <video id="video0" playsinline></video>
        <div class="player-name" id="name0"></div>
      </div>
      <div class="face back" data-face="1">
        <video id="video1" muted playsinline></video>
        <div class="player-name" id="name1"></div>
      </div>
      <div class="face right" data-face="2">
        <video id="video2" muted playsinline></video>
        <div class="player-name" id="name2"></div>
      </div>
      <div class="face left" data-face="3">
        <video id="video3" muted playsinline></video>
        <div class="player-name" id="name3"></div>
      </div>
      <div class="face top" data-face="4">
        <video id="video4" muted playsinline></video>
        <div class="player-name" id="name4"></div>
      </div>
      <div class="face bottom" data-face="5">
        <video id="video5" muted playsinline></video>
        <div class="player-name" id="name5"></div>
      </div>
    </div>
  </div>

  <div class="progress-info" id="progressInfo">סרטון 1 מתוך 6</div>

  <script>
    let audioEnabled = false;
    let currentFace = 0;
    let allVideos = [];
    let videoQueue = [];
    let playedCount = 0;
    
    const rotations = [
      { x: 0, y: 0 },
      { x: 0, y: 180 },
      { x: 0, y: 90 },
      { x: 0, y: -90 },
      { x: -90, y: 0 },
      { x: 90, y: 0 }
    ];

    function getVideosFromParams() {
      const urlParams = new URLSearchParams(window.location.search);
      const storyId = urlParams.get('storyId');
      
      if (storyId) {
        const storedVideos = localStorage.getItem(`cube_videos_${storyId}`);
        if (storedVideos) {
          return JSON.parse(storedVideos);
        }
      }
      
      const videosParam = urlParams.get('videos');
      if (videosParam) {
        return JSON.parse(decodeURIComponent(videosParam));
      }
      
      return [
        { url: 'assets/demo1.mp4', playerName: 'יוצר הסיפור' },
        { url: 'assets/demo2.mp4', playerName: 'משתתף 1' },
        { url: 'assets/demo3.mp4', playerName: 'משתתף 2' },
        { url: 'assets/demo4.mp4', playerName: 'משתתף 3' },
        { url: 'assets/demo5.mp4', playerName: 'משתתף 4' },
        { url: 'assets/demo6.mp4', playerName: 'משתתף 5' }
      ];
    }

    function loadVideoToFace(faceIndex, videoData) {
      const video = document.getElementById(`video${faceIndex}`);
      const nameEl = document.getElementById(`name${faceIndex}`);
      
      if (video && videoData) {
        video.src = videoData.url;
        video.load();
        nameEl.textContent = videoData.playerName || `משתתף ${faceIndex + 1}`;
      }
    }

    function rotateTo(faceIndex) {
      const cube = document.getElementById('cube');
      const rot = rotations[faceIndex];
      cube.style.transform = `rotateX(${-rot.x}deg) rotateY(${-rot.y}deg)`;
      
      document.querySelectorAll('.face').forEach((face, i) => {
        face.classList.toggle('active', i === faceIndex);
      });
      
      currentFace = faceIndex;
      updateProgress();
    }

    function updateProgress() {
      const total = allVideos.length;
      const current = playedCount + 1;
      document.getElementById('progressInfo').textContent = `סרטון ${current} מתוך ${total}`;
    }

    function playCurrentFace() {
      const videos = document.querySelectorAll('video');
      
      videos.forEach((video, index) => {
        if (index === currentFace) {
          video.muted = !audioEnabled;
          video.currentTime = 0;
          video.play().catch(e => console.log('Play error:', e));
        } else {
          video.pause();
          video.muted = true;
        }
      });
    }

    function onVideoEnded() {
      playedCount++;
      
      if (videoQueue.length > 0) {
        const nextVideo = videoQueue.shift();
        loadVideoToFace(currentFace, nextVideo);
      }
      
      if (playedCount >= allVideos.length) {
        console.log('All videos played!');
        document.getElementById('progressInfo').textContent = 'הסתיים!';
        return;
      }
      
      const nextFace = (currentFace + 1) % 6;
      
      setTimeout(() => {
        rotateTo(nextFace);
        setTimeout(() => {
          playCurrentFace();
        }, 1500);
      }, 500);
    }

    function toggleAudio() {
      const btn = document.getElementById('audioBtn');
      audioEnabled = !audioEnabled;
      
      const currentVideo = document.getElementById(`video${currentFace}`);
      if (currentVideo) {
        currentVideo.muted = !audioEnabled;
      }
      
      btn.textContent = audioEnabled ? 'השתק' : 'הפעל סאונד';
    }

    function init() {
      allVideos = getVideosFromParams();
      
      const initialVideos = allVideos.slice(0, 6);
      videoQueue = allVideos.slice(6);
      
      initialVideos.forEach((videoData, index) => {
        loadVideoToFace(index, videoData);
      });
      
      for (let i = initialVideos.length; i < 6; i++) {
        const nameEl = document.getElementById(`name${i}`);
        if (nameEl) nameEl.textContent = '';
      }
      
      document.querySelectorAll('video').forEach(video => {
        video.addEventListener('ended', onVideoEnded);
      });
      
      updateProgress();
      
      setTimeout(() => {
        rotateTo(0);
        playCurrentFace();
      }, 1000);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
