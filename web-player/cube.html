<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reflectly 3D Cube</title>
<style>
  :root {
    --size: 300px;
    --persp: 900px;
    --duration: 14s;
  }
  body {
    margin:0;
    display:grid;
    place-items:center;
    height:100vh;
    background:#0f1020;
    color:#fff;
    font-family:sans-serif;
    position:relative;
  }
  .audio-control {
    position:fixed;
    top:20px;
    right:20px;
    padding:10px 20px;
    background:#8B5CF6;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    z-index:1000;
  }
  .audio-control:hover {
    background:#7C3AED;
  }
  .stage {
    width:var(--size);
    height:var(--size);
    perspective:var(--persp);
  }
  .cube {
    width:100%; height:100%;
    position:relative;
    transform-style:preserve-3d;
    animation: spin var(--duration) linear infinite;
  }
  @keyframes spin {
    from { transform: rotateX(0deg) rotateY(0deg); }
    to   { transform: rotateX(360deg) rotateY(360deg); }
  }
  .face {
    position:absolute;
    width:100%; height:100%;
    display:grid; place-items:center;
    backface-visibility:hidden;
    border:1px solid rgba(255,255,255,.2);
    border-radius:10px;
    overflow:hidden;
    background:#222a;
    font-size:20px;
    font-weight:bold;
  }
  .face video {
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    position: relative;
  }
  .front  { transform: translateZ(calc(var(--size)/2)); }
  .back   { transform: rotateY(180deg) translateZ(calc(var(--size)/2)); }
  .right  { transform: rotateY(90deg)  translateZ(calc(var(--size)/2)); }
  .left   { transform: rotateY(-90deg) translateZ(calc(var(--size)/2)); }
  .top    { transform: rotateX(90deg)  translateZ(calc(var(--size)/2)); }
  .bottom { transform: rotateX(-90deg) translateZ(calc(var(--size)/2)); }
</style>
</head>
<body>
  <button class="audio-control" onclick="toggleAudio()" id="audioBtn">הפעל סאונד</button>
  
  <div class="stage">
    <div class="cube">
      <div class="face front"><video id="video0" autoplay loop playsinline></video></div>
      <div class="face back"><video id="video1" autoplay loop muted playsinline></video></div>
      <div class="face right"><video id="video2" autoplay loop muted playsinline></video></div>
      <div class="face left"><video id="video3" autoplay loop muted playsinline></video></div>
      <div class="face top"><video id="video4" autoplay loop muted playsinline></video></div>
      <div class="face bottom"><video id="video5" autoplay loop muted playsinline></video></div>
    </div>
  </div>

  <script>
    let audioEnabled = false;
    let audioContext = null;
    let gainNode = null;
    let videoSource = null;

    function initializeVideoOnlySound() {
      console.log('Preparing audio boost system');
    }

    async function setupSuperAmplifier(videoElement) {
      try {
        if (audioContext && videoSource) {
          console.log('AMPLIFIER: Already connected, skipping setup');
          return true;
        }

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        videoSource = audioContext.createMediaElementSource(videoElement);

        const compressor = audioContext.createDynamicsCompressor();
        compressor.threshold.value = -24;
        compressor.knee.value = 30;
        compressor.ratio.value = 12;
        compressor.attack.value = 0.003;
        compressor.release.value = 0.25;

        gainNode = audioContext.createGain();
        gainNode.gain.value = 8.0;

        const limiter = audioContext.createDynamicsCompressor();
        limiter.threshold.value = -3;
        limiter.knee.value = 0;
        limiter.ratio.value = 20;
        limiter.attack.value = 0.001;
        limiter.release.value = 0.01;

        videoSource.connect(compressor);
        compressor.connect(gainNode);
        gainNode.connect(limiter);
        limiter.connect(audioContext.destination);

        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }

        console.log('EXTREME AMPLIFIER: Audio boost activated at 800% POWER!');
        return true;
      } catch (error) {
        console.error('AMPLIFIER ERROR:', error.message || error);
        return false;
      }
    }

    async function toggleAudio() {
      const videos = document.querySelectorAll('video');
      const btn = document.getElementById('audioBtn');

      if (!audioEnabled) {
        videos.forEach(async (video, index) => {
          if (index === 0) {
            video.muted = false;
            video.volume = 1.0;
            const amplifierSuccess = await setupSuperAmplifier(video);
            if (amplifierSuccess) {
              console.log('EXTREME BOOST: Video amplified to 800% MAXIMUM power!');
            }
            setInterval(() => {
              if (video.volume < 1.0) {
                video.volume = 1.0;
              }
              if (gainNode && gainNode.gain.value < 8.0) {
                gainNode.gain.value = 8.0;
              }
            }, 1000);
          } else {
            video.muted = true;
          }
        });
        btn.textContent = 'השתק מגבר x8';
        audioEnabled = true;
      } else {
        videos.forEach(video => {
          video.muted = true;
        });
        if (audioContext && audioContext.state !== 'closed') {
          try {
            if (videoSource) videoSource.disconnect();
            if (gainNode) gainNode.disconnect();
          } catch (error) {
            console.log('Amplifier disconnect error:', error);
          }
        }
        btn.textContent = 'הפעל סאונד';
        audioEnabled = false;
      }
    }

    function getVideoUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      const videoUrl = urlParams.get('video');
      const storyId = urlParams.get('storyId');
      
      if (videoUrl) {
        return decodeURIComponent(videoUrl);
      }
      
      if (storyId) {
        const storedUrl = localStorage.getItem(`final_video_${storyId}`);
        if (storedUrl) return storedUrl;
      }
      
      return 'assets/final.mp4';
    }

    document.addEventListener('DOMContentLoaded', function() {
      initializeVideoOnlySound();
      
      const videoUrl = getVideoUrl();
      console.log('Loading video:', videoUrl);

      setTimeout(() => {
        const videos = document.querySelectorAll('video');
        videos.forEach(async (video, index) => {
          video.src = videoUrl;
          
          if (index === 0) {
            video.muted = false;
            video.volume = 1.0;

            setTimeout(async () => {
              const amplifierSuccess = await setupSuperAmplifier(video);
              if (amplifierSuccess) {
                console.log('STARTUP BOOST: Auto-amplifier activated at 800% EXTREME power!');
              }
            }, 2000);

            video.addEventListener('loadeddata', async () => {
              video.volume = 1.0;
            });

            video.addEventListener('canplay', async () => {
              video.volume = 1.0;
              setTimeout(async () => {
                if (!audioContext) {
                  await setupSuperAmplifier(video);
                }
              }, 1000);
            });
          } else {
            video.muted = true;
          }
          
          video.currentTime = 0;
          video.play().catch(e => {
            console.log(`Video ${index} failed:`, e);
            setTimeout(() => {
              video.play().catch(e2 => console.log(`Video ${index} retry failed:`, e2));
            }, 500);
          });
        });
        
        audioEnabled = true;
        document.getElementById('audioBtn').textContent = 'השתק מגבר x8';

        setTimeout(() => {
          console.log('SYSTEM READY: EXTREME audio amplifier system at 800% power fully initialized!');
        }, 3000);
      }, 1000);
    });
  </script>
</body>
</html>
